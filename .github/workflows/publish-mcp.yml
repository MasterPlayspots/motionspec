# .github/workflows/publish-mcp.yml — auto-publish server.json to the Official MCP Registry
# on every tagged release, via GitHub OIDC (no stored secrets). continue-on-error keeps
# a registry outage from failing the release.
#
# Install: copy into MasterPlayspots/motionspec at .github/workflows/publish-mcp.yml
# (server.json at repo root is already version-synced by scripts/sync-server-version.js —
#  replace it with DISTRIBUTION/mcp/server.json first to add the streamable-http remote.)

name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  id-token: write   # OIDC for mcp-publisher login github-oidc
  contents: read

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          curl -sL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/').tar.gz" \
            | tar xz mcp-publisher
          ./mcp-publisher --version

      - name: Validate server.json version matches tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(node -p "require('./server.json').version")
          echo "tag=$TAG server.json=$VER"
          test "$TAG" = "$VER" || { echo "::warning::server.json version ($VER) != tag ($TAG) — publishing server.json version anyway"; }

      - name: Login (GitHub OIDC) and publish
        run: |
          set -euo pipefail
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
